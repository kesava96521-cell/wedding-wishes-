<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narendra & Pavani - Wedding Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pastel-pink: #ffd1dc; --soft-purple: #e2d1f9; --gold: #d4af37; --text: #4a4a4a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--pastel-pink), var(--soft-purple)); color: var(--text); overflow: hidden; height: 100vh; }

        /* Page Management */
        .page { 
            position: absolute; width: 100%; height: 100vh; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; text-align: center;
            animation: slideIn 0.6s ease-in-out;
        }
        .active { display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Elements */
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--gold); margin-bottom: 10px; }
        h2 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; }
        .main-img { width: 250px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .story-img { max-width: 90%; max-height: 50vh; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .btn { 
            padding: 15px 40px; border: none; border-radius: 30px; 
            background: var(--gold); color: white; font-size: 1.1rem; 
            cursor: pointer; font-weight: 600;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }

        #typewriter { font-size: 1.2rem; line-height: 1.8; max-width: 600px; min-height: 120px; margin-bottom: 20px; }
        .timer { font-size: 2rem; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <img src="indian-hindu-wedding-bride-groom-600nw-2467295059.jpg" class="main-img">
        <h1>Narendra & Pavani</h1>
        <p>A Beautiful Journey Begins ❤️</p>
        <button class="btn" onclick="startExperience()">Enter Their Story</button>
    </div>

    <div id="page2" class="page">
        <h2>Our Story</h2>
        <div id="typewriter"></div>
        <button id="btn2" class="btn" style="display:none;" onclick="showPage(3)">See Moments</button>
    </div>

    <div id="page3" class="page">
        <h2>Memories</h2>
        <img src="IMG_20260329_120006.jpg" class="story-img">
        <p>Every moment is a treasure...</p>
        <button class="btn" onclick="showPage(4)">The Big Day</button>
    </div>

    <div id="page4" class="page">
        <h2>Counting Down...</h2>
        <div id="timer" class="timer"></div>
        <p>April 1, 2026</p>
        <button class="btn" onclick="showPage(5)">Final Surprise</button>
    </div>

    <div id="page5" class="page">
        <h2>Happy Married Life!</h2>
        <p>The End is Just the Beginning ❤️</p>
        <button class="btn" onclick="celebrate()">Bless the Couple 🎉</button>
    </div>

    <script>
        let currentPage = 1;

        // Start Experience (Handles Audio Permission)
        function startExperience() {
            // Play Background Music
            playBackgroundMusic();
            showPage(2);
            startTypewriter();
        }

        // Switch Pages
        function showPage(num) {
            document.getElementById(`page${currentPage}`).classList.remove('active');
            document.getElementById(`page${num}`).classList.add('active');
            currentPage = num;

            // Page 4 trigger voice wish
            if(num === 4) {
                setTimeout(playTeluguVoice, 1000);
            }
        }

        // Typewriter Effect
        const storyText = "నరేంద్ర గారు ఒక బాధ్యతాయుతమైన గవర్నమెంట్ ఆఫీసర్. పావని గారు అందరినీ ప్రేమించే స్వచ్ఛమైన మనసున్న వ్యక్తి. ఈ ఇద్దరి ప్రయాణం ఇప్పుడు ఒకటవుతోంది...";
        let i = 0;
        function startTypewriter() {
            if (i < storyText.length) {
                document.getElementById("typewriter").innerHTML += storyText.charAt(i);
                i++;
                setTimeout(startTypewriter, 100);
            } else {
                document.getElementById("btn2").style.display = "block";
            }
        }

        // Audio Logic
        function playBackgroundMusic() {
            // Browsers need user interaction to play audio. 
            // You can add a hidden audio element with your music link here.
            console.log("Music Started...");
        }

        function playTeluguVoice() {
            const speech = new SpeechSynthesisUtterance("నరేంద్ర మరియు పావనిలకు వివాహ శుభాకాంక్షలు. మీ ప్రయాణం ఎల్లప్పుడూ సుఖసంతోషాలతో సాగాలని కోరుకుంటున్నాము.");
            speech.lang = 'te-IN';
            speech.rate = 0.9;
            window.speechSynthesis.speak(speech);
        }

        // Countdown Timer
        function updateTimer() {
            const weddingDate = new Date("April 1, 2026 09:00:00").getTime();
            const now = new Date().getTime();
            const diff = weddingDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `${d}d : ${h}h : ${m}m : ${s}s`;
        }
        setInterval(updateTimer, 1000);

        // Confetti
        function celebrate() {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
